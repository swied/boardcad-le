services:
  boardcad-le:
    build: .
    container_name: boardcad-le
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/.Xauthority:/root/.Xauthority:ro
      - ./boards:/app/boards
    network_mode: host
    privileged: true # Often required for GPU access in JOGL
